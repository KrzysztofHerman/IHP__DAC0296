name: Check Workflow Sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  check:
    name: Verify workflow availability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check workflow files
        env:
          TARGET_REPO: IHP-GmbH/Open-Silicon-MPW
          TARGET_BRANCH: main
        shell: bash
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${TARGET_REPO}/contents/workflows?ref=${TARGET_BRANCH}"
          raw_base="https://raw.githubusercontent.com/${TARGET_REPO}/${TARGET_BRANCH}/workflows"

          mapfile -t files < <(
            python3 -c 'import json,sys,urllib.request;url=sys.argv[1];data=json.load(urllib.request.urlopen(url));files=[item.get("name","") for item in data if isinstance(data,list) and item.get("name","").endswith((".yml",".yaml"))];print("\n".join(sorted(files)))' "$api_url"
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No workflow files found in ${TARGET_REPO}:${TARGET_BRANCH}/workflows. Skipping sync."
            exit 0
          fi

          mkdir -p .github/workflows

          missing=()
          updated=()

          for file in "${files[@]}"; do
            src_url="${raw_base}/${file}"
            dest_path=".github/workflows/${file}"

            if curl -fsSL "$src_url" -o "$dest_path"; then
              updated+=("$file")
            else
              missing+=("$file")
            fi
          done

          if [ ${#updated[@]} -ne 0 ]; then
            echo "Synced workflows from ${TARGET_REPO}:${TARGET_BRANCH}/workflows:"
            for file in "${updated[@]}"; do
              echo "- ${file}"
            done
          fi

          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing workflow files in ${TARGET_REPO}:${TARGET_BRANCH}/workflows:"
            for file in "${missing[@]}"; do
              echo "- ${file}"
            done
            exit 1
          fi

      - name: Commit synced workflows
        shell: bash
        run: |
          set -euo pipefail

          if ! git status --porcelain | grep -q '^ M \|^A '; then
            echo "No workflow updates to commit."
            exit 0
          fi

          git add .github/workflows
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync workflows from Open-Silicon-MPW"
          git push
