name: DRC

on: 
    push:
    pull_request:
        branches: [ main]
    workflow_dispatch:

jobs:
    drc:
        runs-on: ubuntu-22.04
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            -   name: Install system dependencies
                run: |
                    sudo apt-get update -qq -y
                    sudo apt-get install -y jq
            -   name: Download latest KLayout (Ubuntu amd64)
                run: |
                    UBUNTU_VERSION=$(lsb_release -rs | cut -d. -f1)
                    KLAYOUT_URL=$(grep -o "https://www\.klayout\.org/downloads/Ubuntu-${UBUNTU_VERSION}/[^\"]*amd64\.deb" link | head -n 1)
                    if [[ -z "$KLAYOUT_URL" ]]; then
                        echo "KLayout .deb URL not found in link for Ubuntu ${UBUNTU_VERSION}"
                        exit 1
                    fi
                    curl -fL -o /tmp/klayout_amd64.deb "$KLAYOUT_URL"
                    if ! dpkg-deb --info /tmp/klayout_amd64.deb >/dev/null 2>&1; then
                        echo "Downloaded file is not a valid Debian archive"
                        exit 1
                    fi
            -   name: Install KLayout
                run: |
                    sudo dpkg -i /tmp/klayout_amd64.deb || true
                    sudo apt-get install -f -y
                    klayout -v
            -   name: Fetch IHP DRC deck and dependencies
                run: |
                    git clone --depth 1 --filter=blob:none --sparse https://github.com/IHP-GmbH/IHP-Open-PDK.git /tmp/ihp-open-pdk
                    git -C /tmp/ihp-open-pdk sparse-checkout set --no-cone /ihp-sg13g2/libs.tech/klayout/tech/drc/ /ihp-sg13g2/libs.tech/klayout/python/sg13g2_pycell_lib/sg13g2_tech_mod.json
            -   name: Run DRC on release GDS
                run: |
                    GDS_PATH=$(jq -r '.release.gds' doc/info.json)
                    if [[ -z "$GDS_PATH" || "$GDS_PATH" == "null" ]]; then
                        echo "release.gds not found in doc/info.json"
                        exit 1
                    fi
                    mkdir -p /tmp/drc-results
                    python3 /tmp/ihp-open-pdk/ihp-sg13g2/libs.tech/klayout/tech/drc/run_drc.py --path="$GDS_PATH" --run_dir=/tmp/drc-results --mp=1
                shell: bash
            -   name: Archive DRC Results
                uses: actions/upload-artifact@v4
                if: always()
                with:
                    name: DRC-Results
                    path: /tmp/drc-results
